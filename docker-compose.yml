version: '3.8'

services:
  # MySQL Database
  mysql-db:
    image: mysql:8.0
    container_name: banking-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: banking_db
      MYSQL_USER: banking_user
      MYSQL_PASSWORD: banking_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-network

  # Spring Boot Backend
  spring-backend:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
    container_name: banking-spring
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/banking_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: banking_user
      SPRING_DATASOURCE_PASSWORD: banking_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
    ports:
      - "8080:8080"
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - banking-network
    restart: unless-stopped

  # FastAPI Gateway
  fastapi-gateway:
    build:
      context: ./gateway-fastapi
      dockerfile: Dockerfile
    container_name: banking-gateway
    environment:
      SPRING_BACKEND_URL: http://spring-backend:8080
      ENVIRONMENT: docker
    ports:
      - "8000:8000"
    depends_on:
      - spring-backend
    networks:
      - banking-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  banking-network:
    driver: bridge

